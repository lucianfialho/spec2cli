openapi: "3.0.3"
info:
  title: Project Management API
  version: "1.0.0"
  description: A large project management API with 50+ endpoints for testing mcp-c at scale
servers:
  - url: http://localhost:4001
tags:
  - name: projects
    description: Manage projects
  - name: tasks
    description: Manage tasks within projects
  - name: users
    description: Manage users and team members
  - name: comments
    description: Manage comments on tasks
  - name: labels
    description: Manage labels for tasks
  - name: milestones
    description: Manage project milestones
  - name: notifications
    description: Manage user notifications
  - name: webhooks
    description: Manage webhooks
  - name: reports
    description: Generate reports and analytics
  - name: files
    description: Manage file attachments
  - name: integrations
    description: Manage third-party integrations
  - name: audit
    description: Audit log and activity tracking
paths:
  # ─── Projects (6 endpoints) ───
  /projects:
    get:
      operationId: listProjects
      summary: List all projects
      tags: [projects]
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [active, archived, all] }, description: "Filter by status" }
        - { name: limit, in: query, schema: { type: integer }, description: "Max items" }
        - { name: offset, in: query, schema: { type: integer }, description: "Pagination offset" }
        - { name: sort, in: query, schema: { type: string, enum: [name, created, updated] }, description: "Sort field" }
      responses: { "200": { description: "List of projects", content: { "application/json": { schema: { type: array, items: { $ref: "#/components/schemas/Project" } } } } } }
    post:
      operationId: createProject
      summary: Create a new project
      tags: [projects]
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { "application/json": { schema: { type: object, required: [name], properties: { name: { type: string, description: "Project name" }, description: { type: string, description: "Project description" }, visibility: { type: string, enum: [public, private], description: "Visibility" }, template: { type: string, description: "Template to use" } } } } } }
      responses: { "201": { description: "Created" } }
  /projects/{projectId}:
    get:
      operationId: getProject
      summary: Get project by ID
      tags: [projects]
      parameters: [{ name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }]
      responses: { "200": { description: "Project details" } }
    put:
      operationId: updateProject
      summary: Update a project
      tags: [projects]
      security: [{ bearerAuth: [] }]
      parameters: [{ name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }]
      requestBody: { content: { "application/json": { schema: { type: object, properties: { name: { type: string }, description: { type: string }, status: { type: string, enum: [active, archived] } } } } } }
      responses: { "200": { description: "Updated" } }
    delete:
      operationId: deleteProject
      summary: Delete a project
      tags: [projects]
      security: [{ bearerAuth: [] }]
      parameters: [{ name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }]
      responses: { "204": { description: "Deleted" } }
  /projects/{projectId}/archive:
    post:
      operationId: archiveProject
      summary: Archive a project
      tags: [projects]
      security: [{ bearerAuth: [] }]
      parameters: [{ name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }]
      responses: { "200": { description: "Archived" } }

  # ─── Tasks (8 endpoints) ───
  /projects/{projectId}/tasks:
    get:
      operationId: listTasks
      summary: List tasks in a project
      tags: [tasks]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: status, in: query, schema: { type: string, enum: [open, in_progress, done, blocked] }, description: "Filter by status" }
        - { name: priority, in: query, schema: { type: string, enum: [low, medium, high, critical] }, description: "Filter by priority" }
        - { name: assignee, in: query, schema: { type: string }, description: "Filter by assignee username" }
        - { name: label, in: query, schema: { type: string }, description: "Filter by label" }
        - { name: milestone, in: query, schema: { type: integer }, description: "Filter by milestone ID" }
        - { name: limit, in: query, schema: { type: integer }, description: "Max items" }
      responses: { "200": { description: "List of tasks" } }
    post:
      operationId: createTask
      summary: Create a new task
      tags: [tasks]
      security: [{ bearerAuth: [] }]
      parameters: [{ name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }]
      requestBody: { required: true, content: { "application/json": { schema: { type: object, required: [title], properties: { title: { type: string, description: "Task title" }, description: { type: string, description: "Task description" }, priority: { type: string, enum: [low, medium, high, critical], description: "Priority" }, assignee: { type: string, description: "Assignee username" }, labels: { type: string, description: "Comma-separated labels" }, milestone: { type: integer, description: "Milestone ID" }, dueDate: { type: string, description: "Due date (ISO 8601)" } } } } } }
      responses: { "201": { description: "Created" } }
  /projects/{projectId}/tasks/{taskId}:
    get:
      operationId: getTask
      summary: Get task by ID
      tags: [tasks]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: taskId, in: path, required: true, schema: { type: integer }, description: "Task ID" }
      responses: { "200": { description: "Task details" } }
    put:
      operationId: updateTask
      summary: Update a task
      tags: [tasks]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: taskId, in: path, required: true, schema: { type: integer }, description: "Task ID" }
      requestBody: { content: { "application/json": { schema: { type: object, properties: { title: { type: string }, description: { type: string }, status: { type: string, enum: [open, in_progress, done, blocked] }, priority: { type: string, enum: [low, medium, high, critical] }, assignee: { type: string }, dueDate: { type: string } } } } } }
      responses: { "200": { description: "Updated" } }
    delete:
      operationId: deleteTask
      summary: Delete a task
      tags: [tasks]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: taskId, in: path, required: true, schema: { type: integer }, description: "Task ID" }
      responses: { "204": { description: "Deleted" } }
  /projects/{projectId}/tasks/{taskId}/assign:
    post:
      operationId: assignTask
      summary: Assign a task to a user
      tags: [tasks]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: taskId, in: path, required: true, schema: { type: integer }, description: "Task ID" }
      requestBody: { required: true, content: { "application/json": { schema: { type: object, required: [username], properties: { username: { type: string, description: "Username to assign" } } } } } }
      responses: { "200": { description: "Assigned" } }
  /projects/{projectId}/tasks/{taskId}/move:
    post:
      operationId: moveTask
      summary: Move task to another project
      tags: [tasks]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: taskId, in: path, required: true, schema: { type: integer }, description: "Task ID" }
      requestBody: { required: true, content: { "application/json": { schema: { type: object, required: [targetProjectId], properties: { targetProjectId: { type: integer, description: "Target project ID" } } } } } }
      responses: { "200": { description: "Moved" } }
  /tasks/search:
    get:
      operationId: searchTasks
      summary: Search tasks across all projects
      tags: [tasks]
      parameters:
        - { name: q, in: query, required: true, schema: { type: string }, description: "Search query" }
        - { name: status, in: query, schema: { type: string, enum: [open, in_progress, done, blocked] }, description: "Filter by status" }
        - { name: priority, in: query, schema: { type: string, enum: [low, medium, high, critical] }, description: "Filter by priority" }
      responses: { "200": { description: "Search results" } }

  # ─── Users (6 endpoints) ───
  /users:
    get:
      operationId: listUsers
      summary: List all users
      tags: [users]
      parameters:
        - { name: role, in: query, schema: { type: string, enum: [admin, member, viewer] }, description: "Filter by role" }
        - { name: limit, in: query, schema: { type: integer }, description: "Max items" }
      responses: { "200": { description: "List of users" } }
    post:
      operationId: createUser
      summary: Create a new user
      tags: [users]
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { "application/json": { schema: { type: object, required: [username, email], properties: { username: { type: string, description: "Username" }, email: { type: string, description: "Email address" }, role: { type: string, enum: [admin, member, viewer], description: "User role" }, displayName: { type: string, description: "Display name" } } } } } }
      responses: { "201": { description: "Created" } }
  /users/{userId}:
    get:
      operationId: getUser
      summary: Get user by ID
      tags: [users]
      parameters: [{ name: userId, in: path, required: true, schema: { type: integer }, description: "User ID" }]
      responses: { "200": { description: "User details" } }
    put:
      operationId: updateUser
      summary: Update user profile
      tags: [users]
      security: [{ bearerAuth: [] }]
      parameters: [{ name: userId, in: path, required: true, schema: { type: integer }, description: "User ID" }]
      requestBody: { content: { "application/json": { schema: { type: object, properties: { email: { type: string }, role: { type: string, enum: [admin, member, viewer] }, displayName: { type: string } } } } } }
      responses: { "200": { description: "Updated" } }
    delete:
      operationId: deleteUser
      summary: Delete a user
      tags: [users]
      security: [{ bearerAuth: [] }]
      parameters: [{ name: userId, in: path, required: true, schema: { type: integer }, description: "User ID" }]
      responses: { "204": { description: "Deleted" } }
  /users/me:
    get:
      operationId: getCurrentUser
      summary: Get current authenticated user
      tags: [users]
      security: [{ bearerAuth: [] }]
      responses: { "200": { description: "Current user" } }

  # ─── Comments (4 endpoints) ───
  /projects/{projectId}/tasks/{taskId}/comments:
    get:
      operationId: listComments
      summary: List comments on a task
      tags: [comments]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: taskId, in: path, required: true, schema: { type: integer }, description: "Task ID" }
      responses: { "200": { description: "List of comments" } }
    post:
      operationId: createComment
      summary: Add a comment to a task
      tags: [comments]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: taskId, in: path, required: true, schema: { type: integer }, description: "Task ID" }
      requestBody: { required: true, content: { "application/json": { schema: { type: object, required: [body], properties: { body: { type: string, description: "Comment text" } } } } } }
      responses: { "201": { description: "Comment created" } }
  /projects/{projectId}/tasks/{taskId}/comments/{commentId}:
    put:
      operationId: updateComment
      summary: Edit a comment
      tags: [comments]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: taskId, in: path, required: true, schema: { type: integer }, description: "Task ID" }
        - { name: commentId, in: path, required: true, schema: { type: integer }, description: "Comment ID" }
      requestBody: { content: { "application/json": { schema: { type: object, properties: { body: { type: string } } } } } }
      responses: { "200": { description: "Updated" } }
    delete:
      operationId: deleteComment
      summary: Delete a comment
      tags: [comments]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: taskId, in: path, required: true, schema: { type: integer }, description: "Task ID" }
        - { name: commentId, in: path, required: true, schema: { type: integer }, description: "Comment ID" }
      responses: { "204": { description: "Deleted" } }

  # ─── Labels (4 endpoints) ───
  /projects/{projectId}/labels:
    get:
      operationId: listLabels
      summary: List labels in a project
      tags: [labels]
      parameters: [{ name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }]
      responses: { "200": { description: "List of labels" } }
    post:
      operationId: createLabel
      summary: Create a label
      tags: [labels]
      security: [{ bearerAuth: [] }]
      parameters: [{ name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }]
      requestBody: { required: true, content: { "application/json": { schema: { type: object, required: [name, color], properties: { name: { type: string, description: "Label name" }, color: { type: string, description: "Hex color (#ff0000)" }, description: { type: string, description: "Label description" } } } } } }
      responses: { "201": { description: "Created" } }
  /projects/{projectId}/labels/{labelId}:
    put:
      operationId: updateLabel
      summary: Update a label
      tags: [labels]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: labelId, in: path, required: true, schema: { type: integer }, description: "Label ID" }
      requestBody: { content: { "application/json": { schema: { type: object, properties: { name: { type: string }, color: { type: string }, description: { type: string } } } } } }
      responses: { "200": { description: "Updated" } }
    delete:
      operationId: deleteLabel
      summary: Delete a label
      tags: [labels]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: labelId, in: path, required: true, schema: { type: integer }, description: "Label ID" }
      responses: { "204": { description: "Deleted" } }

  # ─── Milestones (4 endpoints) ───
  /projects/{projectId}/milestones:
    get:
      operationId: listMilestones
      summary: List milestones in a project
      tags: [milestones]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: status, in: query, schema: { type: string, enum: [open, closed] }, description: "Filter by status" }
      responses: { "200": { description: "List of milestones" } }
    post:
      operationId: createMilestone
      summary: Create a milestone
      tags: [milestones]
      security: [{ bearerAuth: [] }]
      parameters: [{ name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }]
      requestBody: { required: true, content: { "application/json": { schema: { type: object, required: [title], properties: { title: { type: string, description: "Milestone title" }, description: { type: string, description: "Description" }, dueDate: { type: string, description: "Due date (ISO 8601)" } } } } } }
      responses: { "201": { description: "Created" } }
  /projects/{projectId}/milestones/{milestoneId}:
    put:
      operationId: updateMilestone
      summary: Update a milestone
      tags: [milestones]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: milestoneId, in: path, required: true, schema: { type: integer }, description: "Milestone ID" }
      requestBody: { content: { "application/json": { schema: { type: object, properties: { title: { type: string }, description: { type: string }, status: { type: string, enum: [open, closed] }, dueDate: { type: string } } } } } }
      responses: { "200": { description: "Updated" } }
    delete:
      operationId: deleteMilestone
      summary: Delete a milestone
      tags: [milestones]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: milestoneId, in: path, required: true, schema: { type: integer }, description: "Milestone ID" }
      responses: { "204": { description: "Deleted" } }

  # ─── Notifications (4 endpoints) ───
  /notifications:
    get:
      operationId: listNotifications
      summary: List notifications for current user
      tags: [notifications]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: read, in: query, schema: { type: boolean }, description: "Filter by read status" }
        - { name: type, in: query, schema: { type: string, enum: [mention, assignment, comment, status_change] }, description: "Filter by type" }
      responses: { "200": { description: "List of notifications" } }
  /notifications/{notificationId}/read:
    post:
      operationId: markNotificationRead
      summary: Mark a notification as read
      tags: [notifications]
      security: [{ bearerAuth: [] }]
      parameters: [{ name: notificationId, in: path, required: true, schema: { type: integer }, description: "Notification ID" }]
      responses: { "200": { description: "Marked as read" } }
  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      summary: Mark all notifications as read
      tags: [notifications]
      security: [{ bearerAuth: [] }]
      responses: { "200": { description: "All marked as read" } }
  /notifications/settings:
    get:
      operationId: getNotificationSettings
      summary: Get notification preferences
      tags: [notifications]
      security: [{ bearerAuth: [] }]
      responses: { "200": { description: "Settings" } }

  # ─── Webhooks (4 endpoints) ───
  /projects/{projectId}/webhooks:
    get:
      operationId: listWebhooks
      summary: List webhooks for a project
      tags: [webhooks]
      security: [{ bearerAuth: [] }]
      parameters: [{ name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }]
      responses: { "200": { description: "List of webhooks" } }
    post:
      operationId: createWebhook
      summary: Create a webhook
      tags: [webhooks]
      security: [{ bearerAuth: [] }]
      parameters: [{ name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }]
      requestBody: { required: true, content: { "application/json": { schema: { type: object, required: [url, events], properties: { url: { type: string, description: "Webhook URL" }, events: { type: string, description: "Comma-separated events (task.created, task.updated, comment.created)" }, secret: { type: string, description: "Webhook secret for signature verification" } } } } } }
      responses: { "201": { description: "Created" } }
  /projects/{projectId}/webhooks/{webhookId}:
    put:
      operationId: updateWebhook
      summary: Update a webhook
      tags: [webhooks]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: webhookId, in: path, required: true, schema: { type: integer }, description: "Webhook ID" }
      requestBody: { content: { "application/json": { schema: { type: object, properties: { url: { type: string }, events: { type: string }, active: { type: boolean } } } } } }
      responses: { "200": { description: "Updated" } }
    delete:
      operationId: deleteWebhook
      summary: Delete a webhook
      tags: [webhooks]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: webhookId, in: path, required: true, schema: { type: integer }, description: "Webhook ID" }
      responses: { "204": { description: "Deleted" } }

  # ─── Reports (5 endpoints) ───
  /projects/{projectId}/reports/summary:
    get:
      operationId: getProjectSummary
      summary: Get project summary report
      tags: [reports]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: from, in: query, schema: { type: string }, description: "Start date (ISO 8601)" }
        - { name: to, in: query, schema: { type: string }, description: "End date (ISO 8601)" }
      responses: { "200": { description: "Summary report" } }
  /projects/{projectId}/reports/velocity:
    get:
      operationId: getVelocityReport
      summary: Get team velocity report
      tags: [reports]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: weeks, in: query, schema: { type: integer }, description: "Number of weeks to analyze" }
      responses: { "200": { description: "Velocity report" } }
  /projects/{projectId}/reports/burndown:
    get:
      operationId: getBurndownReport
      summary: Get burndown chart data
      tags: [reports]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: milestoneId, in: query, schema: { type: integer }, description: "Milestone ID" }
      responses: { "200": { description: "Burndown data" } }
  /reports/team-workload:
    get:
      operationId: getTeamWorkload
      summary: Get team workload distribution
      tags: [reports]
      security: [{ bearerAuth: [] }]
      responses: { "200": { description: "Workload report" } }
  /reports/overdue:
    get:
      operationId: getOverdueTasks
      summary: Get all overdue tasks across projects
      tags: [reports]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: priority, in: query, schema: { type: string, enum: [low, medium, high, critical] }, description: "Filter by priority" }
      responses: { "200": { description: "Overdue tasks" } }

  # ─── Files (4 endpoints) ───
  /projects/{projectId}/tasks/{taskId}/files:
    get:
      operationId: listFiles
      summary: List files attached to a task
      tags: [files]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: taskId, in: path, required: true, schema: { type: integer }, description: "Task ID" }
      responses: { "200": { description: "List of files" } }
    post:
      operationId: uploadFile
      summary: Upload a file to a task
      tags: [files]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: taskId, in: path, required: true, schema: { type: integer }, description: "Task ID" }
      requestBody: { required: true, content: { "application/json": { schema: { type: object, required: [name, url], properties: { name: { type: string, description: "File name" }, url: { type: string, description: "File URL" }, size: { type: integer, description: "File size in bytes" } } } } } }
      responses: { "201": { description: "Uploaded" } }
  /projects/{projectId}/tasks/{taskId}/files/{fileId}:
    get:
      operationId: getFile
      summary: Get file metadata
      tags: [files]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: taskId, in: path, required: true, schema: { type: integer }, description: "Task ID" }
        - { name: fileId, in: path, required: true, schema: { type: integer }, description: "File ID" }
      responses: { "200": { description: "File metadata" } }
    delete:
      operationId: deleteFile
      summary: Delete a file
      tags: [files]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: taskId, in: path, required: true, schema: { type: integer }, description: "Task ID" }
        - { name: fileId, in: path, required: true, schema: { type: integer }, description: "File ID" }
      responses: { "204": { description: "Deleted" } }

  # ─── Integrations (4 endpoints) ───
  /integrations:
    get:
      operationId: listIntegrations
      summary: List available integrations
      tags: [integrations]
      responses: { "200": { description: "List of integrations" } }
  /projects/{projectId}/integrations:
    get:
      operationId: listProjectIntegrations
      summary: List integrations enabled for a project
      tags: [integrations]
      security: [{ bearerAuth: [] }]
      parameters: [{ name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }]
      responses: { "200": { description: "Enabled integrations" } }
    post:
      operationId: enableIntegration
      summary: Enable an integration for a project
      tags: [integrations]
      security: [{ bearerAuth: [] }]
      parameters: [{ name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }]
      requestBody: { required: true, content: { "application/json": { schema: { type: object, required: [integrationId], properties: { integrationId: { type: string, description: "Integration ID" }, config: { type: string, description: "JSON config string" } } } } } }
      responses: { "200": { description: "Enabled" } }
  /projects/{projectId}/integrations/{integrationId}:
    delete:
      operationId: disableIntegration
      summary: Disable an integration
      tags: [integrations]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: integrationId, in: path, required: true, schema: { type: string }, description: "Integration ID" }
      responses: { "204": { description: "Disabled" } }

  # ─── Audit (3 endpoints) ───
  /projects/{projectId}/audit:
    get:
      operationId: getAuditLog
      summary: Get audit log for a project
      tags: [audit]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer }, description: "Project ID" }
        - { name: action, in: query, schema: { type: string, enum: [create, update, delete, assign, comment] }, description: "Filter by action type" }
        - { name: from, in: query, schema: { type: string }, description: "Start date" }
        - { name: to, in: query, schema: { type: string }, description: "End date" }
        - { name: userId, in: query, schema: { type: integer }, description: "Filter by user" }
      responses: { "200": { description: "Audit log entries" } }
  /audit/global:
    get:
      operationId: getGlobalAuditLog
      summary: Get global audit log (admin only)
      tags: [audit]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: action, in: query, schema: { type: string, enum: [create, update, delete, assign, comment] }, description: "Filter by action" }
        - { name: limit, in: query, schema: { type: integer }, description: "Max entries" }
      responses: { "200": { description: "Global audit log" } }
  /audit/export:
    post:
      operationId: exportAuditLog
      summary: Export audit log as CSV
      tags: [audit]
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { "application/json": { schema: { type: object, properties: { projectId: { type: integer, description: "Project ID (optional, all if omitted)" }, from: { type: string, description: "Start date" }, to: { type: string, description: "End date" }, format: { type: string, enum: [csv, json], description: "Export format" } } } } } }
      responses: { "200": { description: "Export file" } }

components:
  schemas:
    Project:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string }
        status: { type: string, enum: [active, archived] }
        createdAt: { type: string }
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
